<body>

  <!-- ============ HEADER ============ -->
  <header class="site-header">
    <div class="site-header-inner">
      <a href="index.html" class="site-logo">Orly Backstrom</a>
      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <nav class="site-nav">
        <a href="index.html">Home</a>

  <!-- ============ CONTACT PAGE ============ -->

    <div class="contact-content">
      <h1 class="contact-heading">Get in Touch</h1>

      <div class="contact-links">
        <a href="mailto:orlybackstrom@gmail.com" class="contact-link">orlybackstrom@gmail.com</a>
        <a href="tel:+18584146375" class="contact-link">(858) 414-6375</a>
        <a href="https://www.linkedin.com/in/orlybackstrom/" class="contact-link" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
  </main>


  <!-- ============ MOBILE NAV TOGGLE ============ -->
  <script>
    (function() {
      const toggle = document.querySelector('.nav-toggle');
      const nav = document.querySelector('.site-nav');
      if (!toggle || !nav) return;
      toggle.addEventListener('click', () => {
        const isOpen = nav.classList.toggle('open');
        toggle.classList.toggle('open', isOpen);
        toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        document.body.style.overflow = isOpen ? 'hidden' : '';
      });
      nav.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          nav.classList.remove('open');
          toggle.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
          document.body.style.overflow = '';
        });
      });
    })();
  </script>

</body>
